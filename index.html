<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Serious Game</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-200 min-h-screen flex flex-col items-center justify-start p-8">

  <!-- Handy-Rahmen -->
  <div
    class="bg-black w-[380px] h-[780px] rounded-[40px] shadow-2xl border-8 border-black relative overflow-hidden flex justify-center">

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-6 bg-black rounded-b-3xl z-20"></div>

    <div class="bg-gray-100 w-full h-full p-6 overflow-y-auto">

      <!-- TEMPLATE -->
      <template id="postTemplate">
        <div class="p-6 bg-white rounded-xl shadow-md border border-gray-200">

          <div class="flex items-center gap-3 mb-3">
            <img class="postAccount w-10 h-10 bg-gray-300 rounded-full">
            <h2 class="postAuthor font-semibold text-lg text-gray-800"></h2>
          </div>

          <img class="postImage w-full rounded-lg mb-4" alt="Post Bild">

          <div class="flex items-center gap-6 mt-4">
            <img class="likeIcon w-8 cursor-pointer">
            <img class="commentIcon w-8 cursor-pointer">
            <img class="shareIcon w-8 cursor-pointer">
          </div>

          <p class="postContent text-gray-700 mb-4"></p>

          <div class="postSource text-sm text-gray-500 cursor-pointer"></div>
          <div class="postTimestamp text-sm text-gray-500"></div>
          <div class="comments hidden mt-4 text-sm text-gray-800"></div>

        </div>
      </template>

      <div id="postsWrapper" class="space-y-6"></div>

    </div>
  </div>


  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">x</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <button id="testBtn" class="bg-blue-500 text-white px-4 py-2 rounded mt-4">
    Test in DB schreiben
  </button>

  <script src="script.js"></script>
</body>

</html>
