<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Serious Game</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-200 min-h-screen flex flex-col items-center gap-2 p-2">


  <!-- Handy-Rahmen -->
  <div class="bg-black 
         w-[90vw] max-w-[380px]
         h-[90vh] max-h-[780px]
         rounded-[40px] shadow-2xl border-8 border-black 
         relative overflow-hidden flex justify-center">

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-black rounded-b-3xl z-20"></div>

    <div class="bg-gray-100 w-full h-full p-4 sm:p-6 overflow-y-auto">


      <!-- TEMPLATE -->
      <template id="postTemplate">
        <div class="p-3 sm:p-6 bg-white rounded-xl shadow-md border border-gray-200">

          <div class="flex items-center gap-3 mb-3">
            <img class="postAccount w-10 h-10 bg-gray-300 rounded-full">
            <h2 class="postAuthor font-semibold text-lg text-gray-800"></h2>
          </div>

          <img class="postImage w-full rounded-lg mb-4" alt="Post Bild">

          <div class="flex items-center gap-6 mt-4">

            <div class="flex items-center gap-1">
              <img class="likeIcon w-6 sm:w-8 cursor-pointer">
              <span class="likeCount text-sm text-gray-600"></span>
            </div>


            <div class="flex items-center gap-1 cursor-pointer commentWrapper">
              <img class="commentIcon w-6 sm:w-8">
              <span class="commentCount text-sm text-gray-600"></span>
            </div>


            <img class="shareIcon w-6 sm:w-8 cursor-pointer">
            <img class="warnIcon w-6 sm:w-8 cursor-pointer">
          </div>

          <p class="postContent text-gray-700 mb-4"></p>
          <div class="postSource text-sm text-gray-500 cursor-pointer"></div>
          <div class="postTimestamp text-sm text-gray-500"></div>
          <div class="comments hidden mt-4 text-sm text-gray-800"></div>
        </div>
      </template>

      <div id="postsWrapper" class="space-y-6"></div>

    </div>
  </div>

  <div id="modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
    <div class="bg-white w-[90vw] max-w-sm p-6 rounded-xl relative shadow-xl">

      <button onclick="closeModal()" class="absolute top-3 right-3 text-xl font-bold text-gray-600 hover:text-black">
        x
      </button>

      <div id="modal-body"></div>
      <div id="modal-footer" class="modal-footer"></div>
    </div>
  </div>

  <div class="game-legend">
    <div class="legend-item">
      <img src="images/like.PNG" alt="Like" />
      <span>Positiv</span>
    </div>

    <div class="legend-item">
      <img src="images/comment.PNG" alt="Kommentare" />
      <span>Kommentare</span>
    </div>

    <div class="legend-item">
      <img src="images/share.PNG" alt="Teilen" />
      <span>Teilen</span>
    </div>

    <div class="legend-item">
      <img src="images/warning.png" alt="Kritisch" />
      <span>Kritisch</span>
    </div>
  </div>


  <a href="feedback.html">
    <button id="auswertungBtn" class="bg-blue-500 text-white px-4 py-2 rounded mt-4">
      zum Feedback
    </button>
  </a>

  <div id="pointsPopup" class="points-popup"></div>



  <script src="script.js"></script>
</body>

</html>
