<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serious Game - Auswertung</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-200 min-h-screen flex flex-col items-center justify-start p-8">


    <!-- Neon Glow Left -->
    <div class="pointer-events-none absolute left-0 top-1/2 -translate-y-1/2 
            w-40 h-72 bg-gradient-to-b from-pink-500 to-purple-500 
            opacity-40 blur-3xl rounded-full"></div>

    <!-- Neon Glow Right -->
    <div class="pointer-events-none absolute right-0 top-1/2 -translate-y-1/2 
            w-40 h-72 bg-gradient-to-b from-blue-500 to-cyan-400 
            opacity-40 blur-3xl rounded-full"></div>

            <!-- Logo hinter dem Handy -->
<img src="images/logo.png"
     class="pointer-events-none absolute right-1 top-1/2 -translate-y-1/2
            opacity-10 blur-sm z-0"
     alt="Logo Hintergrund" />

    <!-- Schriftzug -->
    <div class="pointer-events-none hidden md:flex flex-col items-center
            absolute left-80 top-1/2 -translate-y-1/2 
            rotate-180 [writing-mode:vertical-rl]">

        <span class="text-gray-500 font-extrabold text-5xl tracking-widest drop-shadow-xl">
            Medienkompetenz
        </span>

        <span class="text-gray-500 font-semibold text-3xl tracking-wide drop-shadow">
            und Soziale Medien
        </span>
    </div>



    <!-- Handy-Rahmen -->
    <div class="bg-black 
         w-[90vw] max-w-[380px]
         h-[90vh] max-h-[780px]
         rounded-[40px] shadow-2xl border-8 border-black 
         relative overflow-hidden flex justify-center">

        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-black rounded-b-3xl z-20"></div>

        <div class="bg-gray-100 w-full h-full p-4 sm:p-6 overflow-y-auto">

            <div class="w-full flex flex-col">

                <div class="space-y-6 mt-4">


                    <h1 class="text-2xl font-bold text-black-800 text-center">
                        Feedback
                    </h1>
                       <img src="images/feedback.png" class="w-16 h-auto mx-auto">


                    <div class="space-y-4">


                        <!-- Card 1 -->
                        <div class="bg-white p-4 rounded-xl shadow flex flex-col gap-3 text-sm">
                            <label for="feedbackHard" class="flex items-center gap-3 text-gray-800 cursor-pointer">
                                <input type="checkbox" id="feedbackHard" class="w-5 h-5">
                                <span>Es fiel mir schwer, Desinformation zu erkennen.</span>
                            </label>

                            <label for="feedbackEasy" class="flex items-center gap-3 text-gray-800 cursor-pointer">
                                <input type="checkbox" id="feedbackEasy" class="w-5 h-5">
                                <span>Es fiel mir leicht, Desinformation zu erkennen.</span>
                            </label>
                        </div>


                        <!-- Card 2 -->
                        <div class="bg-white p-4 rounded-xl shadow flex flex-col gap-3 text-sm">
                            <label for="feedbackYes" class="flex items-center gap-3 text-gray-800 cursor-pointer">
                                <input type="checkbox" id="feedbackYes" class="w-5 h-5">
                                <span>Mir sind Desinformation oder emotionalisierende Inhalte schon auf Social Media
                                    begegnet.</span>
                            </label>

                            <label for="feedbackNo" class="flex items-center gap-3 text-gray-800 cursor-pointer">
                                <input type="checkbox" id="feedbackNo" class="w-5 h-5">
                                <span>Mir sind Desinformation oder emotionalisierende Inhalte noch nicht auf Social
                                    Media begegnet.</span>
                            </label>
                        </div>

                        <!-- Card 3 -->
                        <div class="bg-white p-4 rounded-xl shadow flex flex-col gap-3 text-sm">
                            <label for="feedbackConfident" class="flex items-center gap-3 text-gray-800 cursor-pointer">
                                <input type="checkbox" id="feedbackConfident" class="w-5 h-5">
                                <span>Ich fühle mich sicher darin, kritische Inhalte auf Sozialen Medien zu
                                    erkennen.</span>
                            </label>

                            <label for="feedbackUncertain" class="flex items-center gap-3 text-gray-800 cursor-pointer">
                                <input type="checkbox" id="feedbackUncertain" class="w-5 h-5">
                                <span>Ich bin mir unsicher, beim erkennen kritischer Inhalte auf Sozialen Medien.</span>
                            </label>
                        </div>

                        <!-- Card 4 -->
                        <div class="bg-white p-4 rounded-xl shadow flex flex-col gap-4 text-sm">

                            <!-- Frage 1 -->
                            <div class="flex flex-col gap-2">
                                <label class="text-gray-800 font-medium">
                                    Ich kann mir vorstellen, dass dieses Spiel mich für Desinformation und
                                    emotionalisierende
                                    Inhalte auf Social Media sensibilisiert hat.
                                </label>

                                <div class="flex justify-between text-center">
                                    <label class="flex flex-col items-center">
                                        <input type="radio" name="sensibilisierung" value="1" class="mb-1">
                                        <span class="text-[11px]">1</span>
                                    </label>

                                    <label class="flex flex-col items-center">
                                        <input type="radio" name="sensibilisierung" value="2" class="mb-1">
                                        <span class="text-[11px]">2</span>
                                    </label>

                                    <label class="flex flex-col items-center">
                                        <input type="radio" name="sensibilisierung" value="3" class="mb-1">
                                        <span class="text-[11px]">3</span>
                                    </label>

                                    <label class="flex flex-col items-center">
                                        <input type="radio" name="sensibilisierung" value="4" class="mb-1">
                                        <span class="text-[11px]">4</span>
                                    </label>

                                    <label class="flex flex-col items-center">
                                        <input type="radio" name="sensibilisierung" value="5" class="mb-1">
                                        <span class="text-[11px]">5</span>
                                    </label>
                                </div>

                                <div class="flex justify-between text-[10px] text-gray-400 mt-1">
                                    <span>stimme nicht zu</span>
                                    <span>stimme voll zu</span>
                                </div>
                            </div>

                            <!-- Frage 2 -->
                            <div class="flex flex-col gap-2">
                                <label class="text-gray-800 font-medium">
                                    Ich habe das Gefühl, dass mir das Spiel gezeigt hat, worauf ich bei Posts achten
                                    kann.
                                </label>

                                <div class="flex justify-between text-center">
                                    <label class="flex flex-col items-center">
                                        <input type="radio" name="hinweise" value="1" class="mb-1">
                                        <span class="text-[11px]">1</span>
                                    </label>

                                    <label class="flex flex-col items-center">
                                        <input type="radio" name="hinweise" value="2" class="mb-1">
                                        <span class="text-[11px]">2</span>
                                    </label>

                                    <label class="flex flex-col items-center">
                                        <input type="radio" name="hinweise" value="3" class="mb-1">
                                        <span class="text-[11px]">3</span>
                                    </label>

                                    <label class="flex flex-col items-center">
                                        <input type="radio" name="hinweise" value="4" class="mb-1">
                                        <span class="text-[11px]">4</span>
                                    </label>

                                    <label class="flex flex-col items-center">
                                        <input type="radio" name="hinweise" value="5" class="mb-1">
                                        <span class="text-[11px]">5</span>
                                    </label>
                                </div>

                                <div class="flex justify-between text-[10px] text-gray-400 mt-1">
                                    <span>stimme nicht zu</span>
                                    <span>stimme voll zu</span>
                                </div>
                            </div>

                            <!-- Frage 3 -->
                            <div class="flex flex-col gap-2">
                                <label class="text-gray-800 font-medium">
                                    Der Social-Media-Feed im Spiel fühlte sich echt an.
                                </label>

                                <div class="flex justify-between text-center">
                                    <label class="flex flex-col items-center">
                                        <input type="radio" name="realismus" value="1" class="mb-1">
                                        <span class="text-[11px]">1</span>
                                    </label>

                                    <label class="flex flex-col items-center">
                                        <input type="radio" name="realismus" value="2" class="mb-1">
                                        <span class="text-[11px]">2</span>
                                    </label>

                                    <label class="flex flex-col items-center">
                                        <input type="radio" name="realismus" value="3" class="mb-1">
                                        <span class="text-[11px]">3</span>
                                    </label>

                                    <label class="flex flex-col items-center">
                                        <input type="radio" name="realismus" value="4" class="mb-1">
                                        <span class="text-[11px]">4</span>
                                    </label>

                                    <label class="flex flex-col items-center">
                                        <input type="radio" name="realismus" value="5" class="mb-1">
                                        <span class="text-[11px]">5</span>
                                    </label>
                                </div>

                                <div class="flex justify-between text-[10px] text-gray-400 mt-1">
                                    <span>stimme nicht zu</span>
                                    <span>stimme voll zu</span>
                                </div>
                            </div>

                        </div>


                    </div>

                </div>


            </div>

            <div class="pb-4 flex justify-center">
                <div class="pb-4">
                    <button id="feedbackSubmit" class="bg-blue-500 text-white px-4 py-2 rounded mt-4">
                        Feedback senden
                    </button>
                </div>
            </div>

        </div>


        <div id="postsWrapper" class="space-y-6"></div>

    </div>
    
    <a href="end.html">
        <button class="bg-blue-500 text-white px-4 py-2 rounded mt-4">
            zu meiner Auswertung
        </button>
    </a>



    <script src="scriptend.js"></script>
</body>

</html>
