<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serious Game - Auswertung</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-200 min-h-screen flex flex-col items-center justify-start p-8">


    <!-- Neon Glow Left -->
    <div class="pointer-events-none absolute left-0 top-1/2 -translate-y-1/2 
            w-40 h-72 bg-gradient-to-b from-pink-500 to-purple-500 
            opacity-40 blur-3xl rounded-full"></div>

    <!-- Neon Glow Right -->
    <div class="pointer-events-none absolute right-0 top-1/2 -translate-y-1/2 
            w-40 h-72 bg-gradient-to-b from-blue-500 to-cyan-400 
            opacity-40 blur-3xl rounded-full"></div>

    <!-- Schriftzug -->
    <div class="pointer-events-none hidden md:flex flex-col items-center
            absolute left-80 top-1/2 -translate-y-1/2 
            rotate-180 [writing-mode:vertical-rl]">

        <span class="text-gray-500 font-extrabold text-5xl tracking-widest drop-shadow-xl">
            Medienkompetenz
        </span>

        <span class="text-gray-500 font-semibold text-3xl tracking-wide drop-shadow">
            und Sozialen Medien
        </span>
    </div>



    <!-- Handy-Rahmen -->
    <div class="bg-black 
         w-[90vw] max-w-[380px]
         h-[90vh] max-h-[780px]
         rounded-[40px] shadow-2xl border-8 border-black 
         relative overflow-hidden flex justify-center">

        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-black rounded-b-3xl z-20"></div>

        <div class="bg-gray-100 w-full h-full p-4 sm:p-6 overflow-y-auto">

            <div class="w-full h-full flex flex-col justify-between">

                <div class="space-y-6 mt-4">


                    <h1 class="text-2xl font-bold text-black-800 text-center">
                        Feedback
                    </h1>


                    <div class="space-y-4">


                 <!-- Card 1 -->
<div class="bg-white p-4 rounded-xl shadow flex flex-col gap-3">
    <label for="feedbackHard" class="flex items-center gap-3 text-gray-800 cursor-pointer">
        <input type="checkbox" id="feedbackHard" class="w-5 h-5">
        <span>Es fiel mir schwer, Desinformation zu erkennen.</span>
    </label>

    <label for="feedbackEasy" class="flex items-center gap-3 text-gray-800 cursor-pointer">
        <input type="checkbox" id="feedbackEasy" class="w-5 h-5">
        <span>Es fiel mir leicht, Desinformation zu erkennen.</span>
    </label>
</div>


                       <!-- Card 2 -->
<div class="bg-white p-4 rounded-xl shadow flex flex-col gap-3">
    <label for="feedbackYes" class="flex items-center gap-3 text-gray-800 cursor-pointer">
        <input type="checkbox" id="feedbackYes" class="w-5 h-5">
        <span>Mir sind Desinformation oder emotionalisierende Inhalte schon auf Social Media begegnet.</span>
    </label>

    <label for="feedbackNo" class="flex items-center gap-3 text-gray-800 cursor-pointer">
        <input type="checkbox" id="feedbackNo" class="w-5 h-5">
        <span>Mir sind Desinformation oder emotionalisierende Inhalte noch nicht auf Social Media begegnet.</span>
    </label>
</div>

                <!-- Card 3 -->
<div class="bg-white p-4 rounded-xl shadow flex flex-col gap-3">
    <label for="feedbackConfident" class="flex items-center gap-3 text-gray-800 cursor-pointer">
        <input type="checkbox" id="feedbackConfident" class="w-5 h-5">
        <span>Ich fühle mich sicher darin, kritische Inhalte auf Sozialen Medien zu erkennen.</span>
    </label>

    <label for="feedbackUncertain" class="flex items-center gap-3 text-gray-800 cursor-pointer">
        <input type="checkbox" id="feedbackUncertain" class="w-5 h-5">
        <span>Ich bin mir unsicher, beim erkennen kritischer Inhalte auf Sozialen Medien.</span>
    </label>
</div>



                    </div>


                </div>

<div class="pb-4 flex justify-center">
                <div class="pb-4">
                    <button id="feedbackSubmit" class="bg-blue-500 text-white px-4 py-2 rounded mt-4">
                        Feedback senden
                    </button>
                </div></div>

            </div>


            <div id="postsWrapper" class="space-y-6"></div>

        </div>
    </div>
  <a href="end.html">
  <button id="auswertungBtn" class="bg-blue-500 text-white px-4 py-2 rounded mt-4">
    zu meiner Auswertung
  </button>
  </a>



    <script src="scriptend.js"></script>
</body>

</html>
